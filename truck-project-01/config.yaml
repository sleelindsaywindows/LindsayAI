depot:
  name: Lindsay Windows — Georgia Plant
  address: ""   # fill in with actual plant address for geocoded distance routing

routing:
  max_route_hours: 9.0          # Joseph's 9-hour driver limit (11-hr legal max, 9-hr practical cap)
  stop_time_minutes: 45         # estimated unload time per stop; 30–60 min per neighborhood (confirm with Joseph)
  max_fill_pct: 90              # optimizer caps truck load at this % of capacity; 90% leaves buffer for real-world variance
  manual_truck_count: 13        # trucks used in current manual process (6/17 baseline); update per run for accurate savings display
  straight_speed_mph: 47        # 26ft straight trucks — nimbler through subdivisions and tight streets
  trailer_speed_mph: 40         # 53ft trailers — slower on all road types (Joseph confirmed)
  solver_time_limit_seconds: 30
  exclude_route_patterns:
    - "Lindsay MO"              # interplant MO transfer — not a customer delivery
  min_sqft_threshold: 5.0      # stops below this sq ft are skipped (screen-only / placeholder stops)
