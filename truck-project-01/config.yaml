measurement:
  unit: square_feet
  label: square feet
  abbreviation: sq ft

# Practical floor capacities — theoretical minus door clearance and wall positioning.
# 53-ft trailer:  8 ft wide × 48 ft usable depth = 384 sq ft  (theoretical: 8.25 × 52 = 429)
# 26-ft straight: 8 ft wide × 22 ft usable depth = 176 sq ft
# Screens are placed on top of windows → zero floor allocation (revisit if screen volume grows).
trucks:
  - name: 26ft Straight Truck
    type: straight
    max_capacity: 176.0
    fixed_cost: 5.0      # activation penalty in equivalent miles (keep small trucks preferred)
    cost_per_mile: 1.50  # $/mile placeholder for future cost-objective layer

  - name: 53ft Trailer
    type: trailer
    max_capacity: 384.0
    fixed_cost: 20.0     # higher penalty — solver fills straight trucks before activating trailer
    cost_per_mile: 1.75  # $/mile placeholder

depot:
  name: Lindsay Windows — Georgia Plant
  address: ""   # fill in with actual plant address for geocoded distance routing

routing:
  max_route_miles: 400          # hard per-driver daily cap (HOS compliance)
                                # NC/VA multi-day runs need separate scheduling logic
  solver_time_limit_seconds: 15
