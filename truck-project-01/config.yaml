measurement:
  unit: square_feet
  label: square feet
  abbreviation: sq ft

# Practical floor capacities from Geoff's FeneVision Trucks sheet (confirmed 2026-06-17).
# 53-ft trailer:  8.25 ft × 52.25 ft = 431.06 sq ft  (FeneVision TruckType 11)
# 26-ft straight: 8.00 ft × 26.00 ft = 208.00 sq ft  (FeneVision TruckType 14)
# Screens are placed on top of windows → zero floor allocation.
